<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naula Beach Dart</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a2a33, #0b1419);
    color: white;
    overflow: hidden;
}

/* 🎯 Dart efekti */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle,
        #00c6ff22 5%,
        transparent 6%,
        #00c6ff22 7%,
        transparent 8%,
        #00c6ff22 10%,
        transparent 11%
    );
    border-radius: 50%;
    animation: rotate 20s linear infinite;
    opacity: 0.3;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.container {
    text-align: center;
    padding: 35px;
    border-radius: 25px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    width: 90%;
    max-width: 420px;
    z-index: 1;
}

h1 {
    font-size: 30px;
}

.subtitle {
    font-size: 14px;
    opacity: 0.7;
}

.date {
    margin: 15px 0 25px;
    font-size: 15px;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 10px;
}

.btn {
    width: 100%;
    padding: 16px;
    margin: 10px 0;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.btn:active {
    transform: scale(0.94);
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

.alert {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    background: #ff3b3b;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s ease;
}

.alert.show {
    opacity: 1;
    transform: translateX(-50%) scale(1);
}

/* 📋 POPUP */
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.popup {
    background: #1c2b33;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    position: relative;
    animation: fadeIn 0.3s ease;
transform: scale(0.9);
opacity: 0;
animation: popupAnim 0.25s ease forwards;
}

@keyframes popupAnim {
    to {
        transform: scale(1);
        opacity: 1;
    }
}

@keyframes fadeIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 20px;
    cursor: pointer;
}

.popup-content {
    margin-top: 20px;
    white-space: pre-line;
    line-height: 1.6;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">
    <h1>🏖️ Naula Beach</h1>
    <div class="subtitle">Dart Turnuvası</div>

    <div class="date" id="dateText">
        Turnuva Tarihi: 📅 XX/XX/XXXX
    </div>

    <button class="btn" onclick="goLeague()">Lig Grupları</button>
    <button class="btn" onclick="goKnockout()">Elemeler</button>
    <button class="btn" onclick="openFixture()">Fikstür</button>

    <div class="footer">QR kodu kaydet, turnuvayı takip et 🎯</div>
</div>

<div class="alert" id="alertBox">
    Şuanda Planlanan Bir Turnuva Yok!
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
    <div class="popup">
        <div class="close-btn" onclick="closePopup()">✖</div>
        <h3>📋 Fikstür</h3>
        <div class="popup-content" id="fixtureContent"></div>
    </div>
</div>

<script>
const leagueLink = "https://n01darts.com/n01/league/season.php?id=t_Ko8u_8599"; /* lig linki buraya */
const knockoutLink = ""; /* turnuva linki buraya */
const tournamentDate = "10/04/2026";

const fixtureText = `/*fikstür buraya */
1. Maç: Ayşe - Ali
2. Maç: Veli - Fatma
3. Maç: Mehmet - Ayşe
4. Maç: Ahmet - Veli
5. Maç: Ali - Mehmet
6. Maç: Ahmet - Fatma
`;

document.getElementById("dateText").innerText =
"Turnuva Tarihi: 📅 " + tournamentDate;

function showAlert() {
    const alert = document.getElementById("alertBox");
    alert.classList.add("show");
    setTimeout(() => alert.classList.remove("show"), 2000);
}

function goLeague() {
    if (!leagueLink) return showAlert();
    window.location.href = leagueLink;
}

function goKnockout() {
    if (!knockoutLink) return showAlert();
    window.location.href = knockoutLink;
}

function openFixture() {
    if (!fixtureText.trim()) return showAlert();
    document.getElementById("fixtureContent").innerText = fixtureText;
    document.getElementById("popupOverlay").style.display = "flex";
}

function closePopup(e) {
    if (!e || e.target.id === "popupOverlay") {
        document.getElementById("popupOverlay").style.display = "none";
    }
}
</script>

</body>
</html>
